<section class="content-section">
    <h2>各季經典劇照</h2>

    <h3>第一季（2007）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/9/9f/Gossip_Girl_Season_1.jpg" class="ai-img">
    <p>Serena 回歸上東區，與 Blair、Nate 之間的關係引爆整個故事。</p>

    <h3>第二季（2008）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/3/3e/Gossip_Girl_Season_2.jpg" class="ai-img">
    <p>角色關係更加複雜，Chuck 與 Blair 的感情逐漸成為主軸。</p>

    <h3>第三季（2009）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/5/5f/Gossip_Girl_Season_3.jpg" class="ai-img">
    <p>角色進入大學生活，開始面對更成熟的人生選擇。</p>

    <h3>第四季（2010）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/2/29/Gossip_Girl_Season_4.jpg" class="ai-img">
    <p>故事延伸至巴黎，劇情更加國際化與浪漫。</p>

    <h3>第五季（2011）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/e/e5/Gossip_Girl_Season_5.jpg" class="ai-img">
    <p>Blair 的婚姻線與多角關係達到高潮。</p>

    <h3>第六季（2012）</h3>
    <img src="https://upload.wikimedia.org/wikipedia/en/6/6c/Gossip_Girl_Season_6.jpg" class="ai-img">
    <p>最終季揭開 Gossip Girl 的真正身份，為整個故事畫下句點。</p>
</section>
